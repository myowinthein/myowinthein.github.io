<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myo Win Thein</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f8fafc;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1e293b;
      --muted:   #64748b;
      --brand:   #0ea5e9;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: var(--brand);
      box-shadow: 0 2px 12px rgba(14, 165, 233, 0.08);
      text-decoration: none;
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-link {
      font-size: 12px;
      color: var(--brand);
      margin-top: 4px;
    }

    .loading {
      color: var(--muted);
      font-size: 14px;
    }

    footer {
      margin-top: 48px;
      font-size: 12px;
      color: var(--muted);
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--brand); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Myo Win Thein</h1>
  <p>Open source projects</p>
</header>

<div class="grid" id="grid">
  <p class="loading">Loading projects…</p>
</div>

<footer>
  <a href="https://github.com/myowinthein" target="_blank">github.com/myowinthein</a>
</footer>

<script>
  fetch('https://api.github.com/users/myowinthein/repos?per_page=100&sort=updated')
    .then(res => res.json())
    .then(repos => {
      const grid = document.getElementById('grid');
      const paged = repos.filter(r => r.has_pages && !r.fork && r.name !== 'myowinthein.github.io');

      if (paged.length === 0) {
        grid.innerHTML = '<p class="loading">No projects found.</p>';
        return;
      }

      grid.innerHTML = paged.map(r => {
        const url = r.homepage || `https://myowinthein.github.io/${r.name}`;
        const desc = r.description || '';
        return `
          <a class="card" href="${url}" target="_blank">
            <div class="card-name">${r.name}</div>
            <div class="card-desc">${desc}</div>
            <div class="card-link">View site →</div>
          </a>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('grid').innerHTML = '<p class="loading">Could not load projects.</p>';
    });
</script>

</body>
</html>
